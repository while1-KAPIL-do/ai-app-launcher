<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching App...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center">

<div class="text-center max-w-md px-6">

    <div id="spinner"
         class="w-16 h-16 border-4 border-slate-700 border-t-cyan-400
                rounded-full animate-spin mx-auto mb-8"></div>

    <h1 class="text-2xl font-bold mb-2" id="title">Starting server...</h1>

    <p class="text-slate-400 mb-6" id="subtitle">
        Waking up your server... usually takes ~30-60 seconds
    </p>

    <div class="text-2xl font-mono text-cyan-400 mb-6"
         id="status">Initializing...</div>

    <div class="w-full bg-slate-800 rounded-full h-2 mb-8">
        <div id="progress"
             class="bg-cyan-400 h-2 rounded-full transition-all duration-300"
             style="width: 5%"></div>
    </div>

    <p class="text-xs text-slate-500" id="statusText">Connecting to server...</p>
</div>

<script>
const LAMBDA_URL = 'https://faj3rnm9e5.execute-api.ap-south-1.amazonaws.com/start-ec2';
const SERVER_URL = 'http://13.126.63.96';
const HEALTH_URL = SERVER_URL + '/health';
const APP_URL = SERVER_URL + '/ai/sql-assitance';

let progress = 5;

// 🔹 Start EC2 once
async function startServer() {
    try {
        const res = await fetch(LAMBDA_URL);
        const data = await res.json();

        document.getElementById('statusText').textContent =
            `EC2 Status: ${data.status}`;

        // Immediately start checking server
        checkServer();

    } catch (e) {
        document.getElementById('statusText').textContent =
            'Error starting server (check CORS)';
    }
}

// 🔹 Poll server every 2 sec
async function checkServer() {
    document.getElementById('title').textContent = 'Preparing your app...';

    let tries = 0;

    const poll = setInterval(async () => {
        tries++;

        try {
            const res = await fetch(HEALTH_URL, { cache: "no-store" });

            if (res.ok) {
                clearInterval(poll);
                redirect();
                return;
            }

        } catch (err) {
            // server not ready yet
        }

        // Update UI
        progress = Math.min(progress + 2, 95);
        document.getElementById('progress').style.width = progress + '%';
        document.getElementById('status').textContent = `Checking... (${tries})`;
        document.getElementById('statusText').textContent =
            'Server booting... please wait';

        // fallback after too many tries (~2 min)
        if (tries > 60) {
            clearInterval(poll);
            document.getElementById('statusText').innerHTML =
                `<a href="${APP_URL}" class="underline text-cyan-400">Open manually</a>`;
        }

    }, 2000);
}

// 🔹 Redirect instantly when ready
function redirect() {
    document.getElementById('title').textContent = 'Ready 🚀';
    document.getElementById('status').textContent = 'Launching...';
    document.getElementById('progress').style.width = '100%';

    setTimeout(() => {
        window.location.href = APP_URL;
    }, 800);
}

// Start flow
startServer();
</script>

</body>
</html>
