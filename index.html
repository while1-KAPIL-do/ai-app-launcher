<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching App...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center">

<div class="text-center max-w-md px-6">

    <div id="spinner"
         class="w-16 h-16 border-4 border-slate-700 border-t-cyan-400
                rounded-full animate-spin mx-auto mb-8"></div>

    <h1 class="text-2xl font-bold mb-2" id="title">Starting server...</h1>
    <p class="text-slate-400 mb-6">
        This app runs on a sleeping server.<br>
        It will wake up in ~20 seconds.
    </p>

    <div class="text-5xl font-mono font-bold text-cyan-400 mb-6"
         id="countdown">20</div>

    <div class="w-full bg-slate-800 rounded-full h-2 mb-8">
        <div id="progress"
             class="bg-cyan-400 h-2 rounded-full transition-all duration-1000"
             style="width: 0%"></div>
    </div>

    <p class="text-xs text-slate-500" id="statusText">Connecting...</p>
</div>

<script>
const LAMBDA_URL = 'https://faj3rnm9e5.execute-api.ap-south-1.amazonaws.com/start-ec2';
const APP_URL = 'http://13.126.63.96/ai/sql-assitance';

let secondsLeft = 20;
async function startServer() {
    try {
        const res = await fetch(LAMBDA_URL);
        const data = await res.json();

        document.getElementById('statusText').textContent =
            `Server: ${data.status}`;

        if (data.status === 'running') {
            redirect();
        } else {
            startCountdown(20);
        }

    } catch (e) {
        document.getElementById('statusText').textContent =
            'Lambda error (check CORS)';
    }
}

function startCountdown(time) {
    secondsLeft = time;

    // Poll every 2 seconds during countdown — redirect as soon as server is up
    const pollInterval = setInterval(async () => {
        try {
            const res = await fetch(LAMBDA_URL);
            const data = await res.json();
            document.getElementById('statusText').textContent =
                `Checking... ${data.status}`;
            if (data.status === 'running') {
                clearInterval(pollInterval);
                clearInterval(tickInterval);
                redirect();
            }
        } catch {}
    }, 2000);

    // Visual countdown tick (purely cosmetic)
    const tickInterval = setInterval(() => {
        secondsLeft--;

        document.getElementById('countdown').textContent = secondsLeft;
        document.getElementById('progress').style.width =
            ((20 - secondsLeft) / 20) * 100 + '%';

        if (secondsLeft <= 0) {
            clearInterval(tickInterval);
            clearInterval(pollInterval);
            checkServer(); // fallback if still not up after 20s
        }
    }, 1000);
}

async function checkServer() {
    document.getElementById('title').textContent = 'Checking server...';

    let tries = 0;

    const poll = setInterval(async () => {
        tries++;

        try {
            const res = await fetch(LAMBDA_URL);
            const data = await res.json();

            document.getElementById('statusText').textContent =
                `Try ${tries}: ${data.status}`;

            if (data.status === 'running') {
                clearInterval(pollInterval);
                clearInterval(tickInterval);

                // 5-second buffer for service to fully start
                document.getElementById('statusText').textContent = 'Service starting, redirecting in 5s...';
                setTimeout(redirect, 5000);
            }

        } catch {}

        if (tries > 10) {
            clearInterval(poll);
            document.getElementById('statusText').innerHTML =
                `<a href="${APP_URL}" class="underline text-cyan-400">Open manually</a>`;
        }

    }, 5000);
}

function redirect() {
    document.getElementById('title').textContent = 'Ready 🚀';

    setTimeout(() => {
        window.location.href = APP_URL;
    }, 1500);
}

startServer();
</script>

</body>
</html>
